"$schema" = "./node_modules/wrangler/config-schema.json"
name = "agentguard"
main = "src/index.js"
compatibility_date = "2026-05-18"

# --- KV namespace binding ---
# Create with:  npx wrangler kv namespace create GUARD_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "GUARD_KV"
id = "0b7e9cfd921e46c19bc431374a194f30"

# --- Plain (non-secret) vars ---
[vars]
ENV_NAME = "dev"

# --- Secrets (do NOT put real values here) ---
# Set at deploy time, not committed:
#   npx wrangler secret put DISCORD_WEBHOOK_URL
#   npx wrangler secret put ADMIN_TOKEN
